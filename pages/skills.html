<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skills – Saifullah Anowar</title>
  <meta name="description" content="Practical skills of Saifullah Anowar – Tally Prime, ERP Next, MS Excel, and more." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/main.css" />
  <link rel="stylesheet" href="/assets/css/desktop-ui.css" media="screen and (min-width: 1025px)" />
  <link rel="stylesheet" href="/assets/css/mobile-ui.css" media="screen and (max-width: 1024px)" />
</head>

<body>
  <div id="header-placeholder"></div>

  <div class="layout">
    <main class="main">

      <section id="skills" class="skills-section section">
        <div class="glass-card">
          <div class="section-title">
            <h2>Practical Skills</h2>
            <p>Tools and technologies I use to deliver results.</p>
          </div>
          <div class="skills-grid">
            <div class="skill-item">
              <label>TALLY PRIME (Full Experience)<span>95%</span></label>
              <div class="skill-bar"><span style="width: 95%"></span></div>
            </div>
            <div class="skill-item">
              <label>ERP NEXT (Company Setup, CoA, Others)<span>85%</span></label>
              <div class="skill-bar"><span style="width: 85%"></span></div>
            </div>
            <div class="skill-item">
              <label>MS Excel<span>80%</span></label>
              <div class="skill-bar"><span style="width: 90%"></span></div>
            </div>
            <div class="skill-item">
              <label>Operating System<span>80%</span></label>
              <div class="skill-bar"><span style="width: 90%"></span></div>
            </div>
            <div class="skill-item">
              <label>Web Development (HTML/CSS/JS)<span>75%</span></label>
              <div class="skill-bar"><span style="width: 75%"></span></div>
            </div>
            <div class="skill-item">
              <label>Python / Automation<span>70%</span></label>
              <div class="skill-bar"><span style="width: 70%"></span></div>
            </div>
          </div>
        </div>
      </section>

    </main>
  </div>

  <div id="footer-placeholder"></div>

  <script>
    let currentMode = null;

    async function loadUI() {
      const mode = window.innerWidth <= 1024 ? 'mobile' : 'desktop';
      if (mode === currentMode) return;
      currentMode = mode;

      const templateFile = mode === 'mobile'
        ? '/templetes/mobile-ui.html'
        : '/templetes/desktop-ui.html';

      try {
        const res = await fetch(templateFile);
        const html = await res.text();
        const doc = new DOMParser().parseFromString(html, 'text/html');

        const headerPlaceholder = document.getElementById('header-placeholder');
        headerPlaceholder.innerHTML = '';
        const newHeader = doc.querySelector('header');
        if (newHeader) headerPlaceholder.appendChild(newHeader.cloneNode(true));

        if (currentMode === 'mobile') {
          const newNav = doc.querySelector('nav');
          if (newNav) headerPlaceholder.appendChild(newNav.cloneNode(true));
        }

        const footerPlaceholder = document.getElementById('footer-placeholder');
        footerPlaceholder.innerHTML = '';
        const newFooter = doc.querySelector('footer');
        if (newFooter) footerPlaceholder.appendChild(newFooter.cloneNode(true));

        // Mark Skills as active nav link
        document.querySelectorAll('.navmenu a').forEach(a => {
          a.classList.remove('active');
          if (a.getAttribute('href') === '/pages/skills.html') a.classList.add('active');
        });

        initTheme();
        window.dispatchEvent(new Event('scroll'));

      } catch (err) {
        console.error(err);
        document.getElementById('header-placeholder').innerHTML =
          `<div style="padding: 20px; background: red; color: white; text-align: center; z-index: 10000; position: relative;">
            <b>Error loading UI templates.</b> Make sure you are using a local web server (like VS Code Live Server).
          </div>`;
      }
    }

    loadUI();

    window.addEventListener('resize', () => {
      const newMode = window.innerWidth <= 1024 ? 'mobile' : 'desktop';
      if (newMode !== currentMode) {
        currentMode = newMode;
        loadUI();
      }
    });

    function initTheme() {
      const savedTheme = localStorage.getItem('theme');
      const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      const theme = savedTheme || systemTheme;
      document.documentElement.setAttribute('data-theme', theme);
    }

    function toggleTheme() {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
    }

    function toggleMenu() {
      const menu = document.getElementById('navmenu');
      if (menu) menu.classList.toggle('visible');
    }

    window.addEventListener('scroll', () => {
      const header = document.getElementById('header');
      if (header) {
        header.classList.toggle('scrolled', window.scrollY > 50);
      }
    });
  </script>
</body>

</html>
